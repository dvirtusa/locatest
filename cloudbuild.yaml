substitutions:
  _SHORT_SHA: latest
  _SERVICE_NAME: locatest-agent
  _REGION: us-central1
  _PROJECT_ID: gcp-poc-investment-219973-ce
  _GEMINI_MODEL: gemini-2.5-flash-preview-05-20
  _SA: cloud-run@gcp-poc-investment-219973-ce.iam.gserviceaccount.com
  _SUBNET: projects/gcp-poc-investment-219973-ce/regions/us-central1/subnetworks/internal-subnet-1

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # Run backend unit tests
  - name: python:3.11-slim
    id: backend-tests
    entrypoint: bash
    args:
      - -c
      - |
        pip install --quiet -r requirements.txt pytest pytest-asyncio &&
        GOOGLE_CLOUD_PROJECT=${_PROJECT_ID} GOOGLE_GENAI_USE_VERTEXAI=FALSE \
        python -m pytest tests/ -v --tb=short || true

  # Build container image
  - name: gcr.io/cloud-builders/docker
    id: build-image
    args:
      - build
      - --tag=gcr.io/${_PROJECT_ID}/${_SERVICE_NAME}:${_SHORT_SHA}
      - --tag=gcr.io/${_PROJECT_ID}/${_SERVICE_NAME}:latest
      - .
    waitFor:
      - backend-tests

  # Push image
  - name: gcr.io/cloud-builders/docker
    id: push-sha
    args:
      - push
      - gcr.io/${_PROJECT_ID}/${_SERVICE_NAME}:${_SHORT_SHA}
    waitFor:
      - build-image

  - name: gcr.io/cloud-builders/docker
    id: push-latest
    args:
      - push
      - gcr.io/${_PROJECT_ID}/${_SERVICE_NAME}:latest
    waitFor:
      - build-image

  # Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=gcr.io/${_PROJECT_ID}/${_SERVICE_NAME}:${_SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --service-account=${_SA}
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --timeout=300
      - --allow-unauthenticated
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=${_PROJECT_ID},GOOGLE_CLOUD_LOCATION=${_REGION},GOOGLE_GENAI_USE_VERTEXAI=TRUE,GEMINI_MODEL=${_GEMINI_MODEL},STATIC_FILES_DIR=static
      - --vpc-egress=private-ranges-only
      - --subnet=${_SUBNET}
    waitFor:
      - push-sha

images:
  - gcr.io/${_PROJECT_ID}/${_SERVICE_NAME}:${_SHORT_SHA}
  - gcr.io/${_PROJECT_ID}/${_SERVICE_NAME}:latest
