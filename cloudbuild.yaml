substitutions:
  _SERVICE_NAME: locatest-agent
  _REGION: us-central1
  _PROJECT_ID: gcp-poc-investment-219973-ce
  _IMAGE: gcr.io/${_PROJECT_ID}/${_SERVICE_NAME}
  _GEMINI_MODEL: gemini-2.5-flash-preview-05-20
  _SA: cloud-run@gcp-poc-investment-219973-ce.iam.gserviceaccount.com
  _VPC_CONNECTOR: projects/${_PROJECT_ID}/locations/${_REGION}/connectors/nspoke-poc-investment-us-central1
  _SUBNET: projects/${_PROJECT_ID}/regions/${_REGION}/subnetworks/internal-subnet-1

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # Run backend unit tests
  - name: python:3.11-slim
    id: backend-tests
    entrypoint: bash
    args:
      - -c
      - |
        pip install --quiet -r requirements.txt pytest pytest-asyncio &&
        GOOGLE_CLOUD_PROJECT=${_PROJECT_ID} GOOGLE_GENAI_USE_VERTEXAI=FALSE
        python -m pytest tests/ -v --tb=short || true

  # Build and push container image
  - name: gcr.io/cloud-builders/docker
    id: build-image
    args:
      - build
      - --tag=${_IMAGE}:${SHORT_SHA}
      - --tag=${_IMAGE}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    id: push-image
    args: [push, --all-tags, ${_IMAGE}]
    waitFor: [build-image]

  # Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_IMAGE}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --service-account=${_SA}
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --timeout=300
      - --allow-unauthenticated
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=${_PROJECT_ID},GOOGLE_CLOUD_LOCATION=${_REGION},GOOGLE_GENAI_USE_VERTEXAI=TRUE,GEMINI_MODEL=${_GEMINI_MODEL},STATIC_FILES_DIR=static
      - --vpc-egress=private-ranges-only
      - --subnet=${_SUBNET}
    waitFor: [push-image]

images:
  - ${_IMAGE}:${SHORT_SHA}
  - ${_IMAGE}:latest
